name: 🚀Flutter CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'lib/**'
      - 'test/**'
      - 'i18n/**'
      - 'pubspec.yaml'
    # Always enable auto_format on push (handled in job logic)
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to test (leave empty for current)'
        required: false
        default: ''
      auto_format:
        description: 'Auto-format code if needed'
        required: false
        default: true
        type: boolean

jobs:
  analyze:
    name: 📊 Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref)
            || (github.event.inputs.target_branch != '' && format('refs/heads/{0}', github.event.inputs.target_branch)
            || github.ref) }}

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔒 Assert minimum Dart SDK floor
        run: |
          DART_VERSION=$(dart --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          REQUIRED="3.8.1"
          if [ "$(printf '%s\n' "$REQUIRED" "$DART_VERSION" | sort -V | head -1)" != "$REQUIRED" ]; then
            echo "❌ Dart SDK $DART_VERSION is below required minimum $REQUIRED"
            exit 1
          fi
          echo "✅ Dart SDK $DART_VERSION >= $REQUIRED"

      - name: 🔨 Regenerate mocks (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs || echo "⚠️ build_runner failed (known issue with package versions), but mock files are already committed"
        continue-on-error: true

      - name: 🔍 Assert no diff after build_runner
        run: |
          echo "🎨 Checking Dart code formatting..."
          # Enable auto_format by default on push, or respect workflow_dispatch inputs
          AUTO_FORMAT="${{ github.event.inputs.auto_format }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            AUTO_FORMAT="true"
          fi

          if ! dart format --set-exit-if-changed . 2>/dev/null; then
            echo "📝 Formatting issues detected!"
            if [ "$AUTO_FORMAT" = "true" ]; then
              echo "🔧 Auto-formatting enabled. Applying fixes..."
              dart format .
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action [bot]"

              if [ "${{ github.event_name }}" = "pull_request" ]; then
                BRANCH="${{ github.head_ref }}"
              elif [ -n "${{ github.event.inputs.target_branch }}" ]; then
                BRANCH="${{ github.event.inputs.target_branch }}"
              else
                BRANCH="${{ github.ref_name }}"
              fi

              if ! git diff --quiet; then
                git add .
                git commit -m "🎨 Auto-format code with dart format [skip ci]"
                git push origin "$BRANCH"
              fi
            else
              echo "❌ Auto-formatting is disabled. Please format manually:"
              dart format --show-all .
              exit 1
            fi
          else
            echo "✅ All files are already properly formatted!"
          fi

      - name: 🧹 Remove unused imports (dart fix)
        run: |
          echo "🧹 Eliminando imports no usados y aplicando fixes automáticos..."
          dart fix --apply
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [bot]"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          elif [ -n "${{ github.event.inputs.target_branch }}" ]; then
            BRANCH="${{ github.event.inputs.target_branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          if ! git diff --quiet; then
            git add .
            git commit -m "🧹 Remove unused imports and auto-fix code [skip ci]"
            git push origin "$BRANCH"
          fi

      - name: 🔍 Analyze code
        run: flutter analyze --fatal-infos

      - name: 📚 Check Dartdoc
        run: dart doc --validate-links

      - name: 📋 Check pub.dev score
        run: dart pub deps

  test:
    name: 🧪 Testing
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔒 Assert minimum Dart SDK floor
        run: |
          DART_VERSION=$(dart --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          REQUIRED="3.8.1"
          if [ "$(printf '%s\n' "$REQUIRED" "$DART_VERSION" | sort -V | head -1)" != "$REQUIRED" ]; then
            echo "❌ Dart SDK $DART_VERSION is below required minimum $REQUIRED"
            exit 1
          fi
          echo "✅ Dart SDK $DART_VERSION >= $REQUIRED"

      - name: 🔨 Regenerate mocks (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs || echo "⚠️ build_runner failed (known issue with package versions), but mock files are already committed"
        continue-on-error: true

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/pubspec.lock
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: 🧪 Run unit tests (expanded)
        run: |
          flutter test --coverage --reporter=expanded | tee test_output.txt

      - name: 📋 Upload test output
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

      - name: 📈 Generate coverage report
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info -o coverage/html
          lcov --summary coverage/lcov.info

      - name: 📋 Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Commit and push README update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [bot]"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "📊 Update README stats [skip ci]"
            git push
          fi

  comment:
    name: 💬 PR Comment
    runs-on: ubuntu-latest
    needs: [ analyze, test ]
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: 📥 Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
        continue-on-error: true

      - name: 💬 Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const analyzeStatus = '${{ needs.analyze.result }}';
            const testStatus = '${{ needs.test.result }}';
            const getStatusEmoji = (status) => {
              switch (status) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '⏹️';
                case 'skipped': return '⏭️';
                default: return '🔄';
              }
            };
            const autoFormatEnabled = '${{ github.event.inputs.auto_format }}' === 'true' || '${{ github.event_name }}' === 'push';
            const formatNote = autoFormatEnabled ? '🎨 Auto-format: Enabled' : '⚠️ Auto-format: Disabled';
            const comment = `## 🎉 CI Results for PR #${{ github.event.number }}

            ${getStatusEmoji(analyzeStatus)} **Static Analysis**: ${analyzeStatus}
            ${getStatusEmoji(testStatus)} **Tests**: ${testStatus}

            ${formatNote}

            ### ${analyzeStatus === 'success' && testStatus === 'success' ? '🚀 Ready to merge!' : '⚠️ Issues found - check the logs'}

            ${analyzeStatus === 'failure' && !autoFormatEnabled ? '\n💡 **Tip**: Enable auto-format when running the workflow to automatically fix formatting issues!' : ''}

            ---
            *Generated by GitHub Actions*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
