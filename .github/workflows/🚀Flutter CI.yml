name: 🚀Flutter CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'lib/**'
      - 'test/**'
      - 'i18n/**'
      - 'pubspec.yaml'
    # Always enable auto_format on push (handled in job logic)
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to test (leave empty for current)'
        required: false
        default: ''
      auto_format:
        description: 'Auto-format code if needed'
        required: false
        default: true
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: 📊 Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref)
            || (github.event.inputs.target_branch != '' && format('refs/heads/{0}', github.event.inputs.target_branch)
            || github.ref) }}

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔒 Assert minimum Dart SDK floor
        run: |
          DART_VERSION=$(dart --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          REQUIRED="3.11.1"
          if [ "$(printf '%s\n' "$REQUIRED" "$DART_VERSION" | sort -V | head -1)" != "$REQUIRED" ]; then
            echo "❌ Dart SDK $DART_VERSION is below required minimum $REQUIRED"
            exit 1
          fi
          echo "✅ Dart SDK $DART_VERSION >= $REQUIRED"

      - name: 🔨 Regenerate mocks (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs || echo "⚠️ build_runner failed (known issue with package versions), but mock files are already committed"
        continue-on-error: true

      - name: 🔍 Assert no diff after build_runner
        run: |
          echo "🎨 Checking Dart code formatting..."
          
          # Only auto-format on push events (not on PRs)
          AUTO_FORMAT="false"
          if [ "${{ github.event_name }}" = "push" ]; then
            AUTO_FORMAT="true"
          fi

          if ! dart format --set-exit-if-changed . 2>/dev/null; then
            echo "📝 Formatting issues detected!"
            if [ "$AUTO_FORMAT" = "true" ]; then
              echo "🔧 Auto-formatting enabled (push event). Applying fixes..."
              dart format .
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action [bot]"

              BRANCH="${{ github.ref_name }}"

              if ! git diff --quiet; then
                # ⚠️ Exclude auto-generated files from commit
                git add lib/ test/ pubspec.yaml pubspec.lock i18n/ docs/
                git reset -- '**/GeneratedPluginRegistrant*' '**/generated_plugin_registrant*' 2>/dev/null || true
                
                # Only commit if source files changed (not just generated files)
                if ! git diff --cached --quiet; then
                  git commit -m "🎨 Auto-format code with dart format [skip ci]"
                  git push origin "$BRANCH"
                else
                  echo "ℹ️ Only generated files were reformatted, skipping commit"
                  git checkout -- .
                fi
              fi
            else
              echo "❌ Formatting issues detected on PR. Please format locally:"
              dart format --show-all .
              echo ""
              echo "Then run: git add -A && git commit -m '🎨 Format code'"
              exit 1
            fi
          else
            echo "✅ All files are already properly formatted!"
          fi

      - name: 🧹 Remove unused imports (dart fix)
        run: |
          echo "🧹 Checking for unused imports and applying auto-fixes..."
          dart fix --apply
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [bot]"

          # Only auto-commit on push events (not on PRs)
          if [ "${{ github.event_name }}" = "push" ]; then
            BRANCH="${{ github.ref_name }}"

            if ! git diff --quiet; then
              # ⚠️ Exclude auto-generated files from commit
              git add lib/ test/ pubspec.yaml pubspec.lock i18n/ docs/
              git reset -- '**/GeneratedPluginRegistrant*' '**/generated_plugin_registrant*' 2>/dev/null || true
              
              # Only commit if source files changed (not just generated files)
              if ! git diff --cached --quiet; then
                git commit -m "🧹 Remove unused imports and auto-fix code [skip ci]"
                git push origin "$BRANCH"
              else
                echo "ℹ️ Only generated files were modified, skipping commit"
                git checkout -- .
              fi
            fi
          else
            # On PRs, fail if changes needed
            if ! git diff --quiet; then
              echo "❌ Unused imports or auto-fixes needed on PR. Please run locally:"
              echo "  dart fix --apply"
              echo "  git add -A && git commit -m '🧹 Auto-fix code'"
              exit 1
            fi
          fi

      - name: 🔍 Analyze code
        run: flutter analyze --fatal-infos

      - name: 📋 Check pub.dev score
        if: success()
        run: dart pub deps

  test:
    name: 🧪 Testing
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔒 Assert minimum Dart SDK floor
        run: |
          DART_VERSION=$(dart --version 2>&1 | grep -oP '\d+\.\d+\.\d+' | head -1)
          REQUIRED="3.11.1"
          if [ "$(printf '%s\n' "$REQUIRED" "$DART_VERSION" | sort -V | head -1)" != "$REQUIRED" ]; then
            echo "❌ Dart SDK $DART_VERSION is below required minimum $REQUIRED"
            exit 1
          fi
          echo "✅ Dart SDK $DART_VERSION >= $REQUIRED"

      - name: 🔨 Regenerate mocks (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs || echo "⚠️ build_runner failed (known issue with package versions), but mock files are already committed"
        continue-on-error: true


      - name: 🧪 Run unit tests (expanded)
        run: |
          flutter test --coverage --reporter=expanded | tee test_output.txt

      - name: 📋 Upload test output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt

      - name: 📈 Generate coverage report
        if: success()
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          lcov --ignore-errors unused --remove coverage/lcov.info \
            '*/blocs/onboarding/*' \
            '*/pages/onboarding/*' \
            '*/services/backup/*' \
            '*/debug/*' \
            -o coverage/lcov_filtered.info
          genhtml coverage/lcov_filtered.info -o coverage/html
          lcov --ignore-errors unused --summary coverage/lcov_filtered.info

      - name: 📊 Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov_filtered.info
          fail_ci_if_error: true

      - name: 📊 Generate coverage summary
        if: success()
        run: |
          python3 - <<'EOF'
          import subprocess, re, os

          raw = subprocess.run(
            ['lcov', '--ignore-errors', 'unused', '--summary', 'coverage/lcov_filtered.info'],
            capture_output=True, text=True
          ).stdout

          cov   = re.search(r'lines\.*: ([\d.]+)%', raw)
          hit   = re.search(r'lines\.*: [\d.]+% \(([\d]+)', raw)
          tot   = re.search(r'of ([\d]+)', raw)
          pct   = cov.group(1) if cov else '?'
          h     = hit.group(1) if hit else '?'
          total = tot.group(1) if tot else '?'
          icon  = '🟢' if float(pct) >= 70 else '🟡' if float(pct) >= 50 else '🔴'

          summary = f"{icon} Coverage: {pct}% ({h}/{total} lines)"

          dirs = subprocess.run(
            ['lcov', '--ignore-errors', 'unused', '--list', 'coverage/lcov_filtered.info'],
            capture_output=True, text=True
          ).stdout
          lines = [l for l in dirs.splitlines() if '%' in l]
          low = [(l.split('|')[0].strip(), l.split('|')[1].strip())
                 for l in lines if re.search(r'[\d.]+', l.split('|')[1]) and
                 float(re.search(r'[\d.]+', l.split('|')[1]).group()) < 50]
          low.sort(key=lambda x: float(re.search(r'[\d.]+', x[1]).group()))
          top3 = '\n'.join(f"  🔴 {d}: {p}" for d, p in low[:3])
          pain = f"Top gaps:\n{top3}" if top3 else "No critical gaps below 50%"

          output = f"{summary}\n{pain}"
          print(output)

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(f"## 📊 Coverage\n```\n{output}\n```\n")

          with open('coverage/summary.txt', 'w') as f:
              f.write(output)
          EOF

      - name: 📋 Upload coverage artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: 📊 Auto-update README stats
        if: success() && github.event_name == 'push'
        run: |
          SUMMARY=$(lcov --ignore-errors unused --summary coverage/lcov_filtered.info 2>&1)
          COVERAGE=$(echo "$SUMMARY" | grep -oP 'lines......: \K[\d.]+')
          HIT=$(echo "$SUMMARY" | grep -oP 'lines......: [\d.]+% \(\K[\d]+')
          TOTAL=$(echo "$SUMMARY" | grep -oP 'of \K[\d]+')
          TEST_COUNT=$(grep -oP '\+(\d+):' test_output.txt | tail -1 | grep -oP '\d+')

          if   (( $(echo "$COVERAGE >= 70" | bc -l) )); then COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 50" | bc -l) )); then COLOR="yellow"
          else COLOR="red"; fi

          sed -i "s|Coverage-[^-]*%25-[a-z]*\.svg|Coverage-${COVERAGE}%25-${COLOR}.svg|g" README.md
          sed -i "s|Tests-[0-9]*+-[a-z]*\.svg|Tests-${TEST_COUNT}+-brightgreen.svg|g" README.md
          sed -i "s|[0-9.]*% code coverage ([0-9,]* of [0-9,]* lines)|${COVERAGE}% code coverage (${HIT} of ${TOTAL} lines)|g" README.md

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [bot]"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "📊 Update README: ${COVERAGE}% coverage · ${TEST_COUNT} tests [skip ci]"
            git push
          else
            echo "ℹ️ Stats unchanged — skipping commit"
          fi

  gate:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: always()
    steps:
      - name: 🚦 Fail if any job failed
        run: |
          ANALYZE_RESULT="${{ needs.analyze.result }}"
          TEST_RESULT="${{ needs.test.result }}"
          
          echo "Job Results:"
          echo "  Analyze: $ANALYZE_RESULT"
          echo "  Test: $TEST_RESULT"
          
          # Fail only on explicit failures
          if [[ "$ANALYZE_RESULT" == "failure" ]] || [[ "$TEST_RESULT" == "failure" ]]; then
            echo "❌ CI failed — one or more jobs failed"
            exit 1
          fi
          
          # Analyze must always complete successfully
          if [[ "$ANALYZE_RESULT" != "success" ]]; then
            echo "❌ Analysis did not complete successfully (status: $ANALYZE_RESULT)"
            exit 1
          fi
          
          # Test can be cancelled/skipped in edge cases (external interruption)
          # but if it's success, that's ideal
          if [[ "$TEST_RESULT" == "success" ]]; then
            echo "✅ All jobs passed successfully"
          else
            echo "⚠️ Test job status: $TEST_RESULT (but no failure detected)"
            echo "✅ CI gate passed — no critical failures detected"
          fi

  comment:
    name: 💬 PR Comment
    runs-on: ubuntu-latest
    needs: [ gate ]
    if: github.event_name == 'pull_request' && needs.gate.result == 'success'
    steps:
      - name: 📥 Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
        continue-on-error: true

      - name: 💬 Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const analyzeStatus = '${{ needs.analyze.result }}';
            const testStatus = '${{ needs.test.result }}';
            const getStatusEmoji = (status) => {
              switch (status) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '⏹️';
                case 'skipped': return '⏭️';
                default: return '🔄';
              }
            };
            let coverageSummary = '';
            try {
              const fs = require('fs');
              coverageSummary = fs.readFileSync('coverage/summary.txt', 'utf8');
            } catch { coverageSummary = 'Coverage data unavailable'; }

            const comment = `## 🎉 CI Results for PR #${{ github.event.number }}

            ${getStatusEmoji(analyzeStatus)} **Static Analysis**: ${analyzeStatus}
            ${getStatusEmoji(testStatus)} **Tests**: ${testStatus}

            \`\`\`
            ${coverageSummary}
            \`\`\`

            ### ${analyzeStatus === 'success' && testStatus === 'success' ? '🚀 Ready to merge!' : '⚠️ Issues found - check the logs'}


            ---
            *Generated by GitHub Actions*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [ gate ]
    if: success()
    permissions:
      contents: read
      security-events: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy vulnerability scanner
        run: |
          echo "🔍 Starting Trivy security scan..."
          docker run --rm -v ${{ github.workspace }}:/root/src aquasec/trivy:latest fs --format sarif --output /root/src/trivy-results.sarif /root/src
        continue-on-error: true

      - name: 📤 Upload Trivy scan results
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
